name: Frantic Search CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  code_cleaniness_checks:
    name: Formatting Checks
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: nightly
          components: rustfmt
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v6
      - run: cargo fmt --check --all
  tests:
    name: Build and Testing Checks
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable
          components: rustfmt
          targets: wasm32-unknown-unknown
      - uses: actions/checkout@v4
      - name: Fetch Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - run: cargo build --all
      - run: wget -qO- https://github.com/thedodd/trunk/releases/download/v0.16.0/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
      - run: pwd >> $GITHUB_PATH
      - run: trunk build frantic-web/index.html
      - run: cargo build --package frantic-web --verbose
  deployment:
    name: Deploy to GitHub Pages
    needs: tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: stable
          components: rustfmt
          targets: wasm32-unknown-unknown
      - uses: actions/checkout@v6
      - name: Fetch Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: 'latest'
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build WASM with Trunk
        working-directory: frantic-web
        run: trunk build --release=true --filehash=false --public-url "/${{ github.event.repository.name }}/" index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frantic-web/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
